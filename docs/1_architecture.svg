<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" style="background-color:#08080a; font-family: 'Inter', sans-serif;">
    <defs>
        <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0A84FF" />
            <stop offset="100%" stop-color="#0A84FF" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#30D158" />
            <stop offset="100%" stop-color="#30D158" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5E5CE6" />
            <stop offset="100%" stop-color="#5E5CE6" stop-opacity="0.6"/>
        </linearGradient>
        <linearGradient id="gRed" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF453A" />
            <stop offset="100%" stop-color="#FF453A" stop-opacity="0.6"/>
        </linearGradient>
        <style>
            .title { fill: #f3f4f6; font-size: 28px; font-weight: bold; text-anchor: middle; }
            .box-text { fill: #ffffff; font-size: 16px; font-weight: bold; text-anchor: middle; }
            .sub-text { fill: rgba(255,255,255,0.7); font-size: 13px; text-anchor: middle; }
            .arrow { stroke: rgba(255,255,255,0.3); stroke-width: 3; fill: none; }
            .arrow-head { fill: rgba(255,255,255,0.3); }
            .rect-box { rx: 12; ry: 12; stroke: rgba(255,255,255,0.1); stroke-width: 2; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
        </marker>
    </defs>
    <text x="400" y="50" class="title">Banana Parser: Базовая Архитектура</text>
    <rect x="300" y="100" width="200" height="70" fill="url(#gBlue)" class="rect-box" />
    <text x="400.0" y="133.0" class="box-text">1. UI (web_launcher.py)</text>
    <text x="400.0" y="153.0" class="sub-text">Графический интерфейс</text>
    <line x1="400" y1="170" x2="400" y2="220" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="300" y="220" width="200" height="70" fill="url(#gPurple)" class="rect-box" />
    <text x="400.0" y="253.0" class="box-text">2. Оркестратор</text>
    <text x="400.0" y="273.0" class="sub-text">run_scraper.py</text>
    <line x1="400" y1="290" x2="400" y2="340" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="300" y="340" width="200" height="70" fill="url(#gGreen)" class="rect-box" />
    <text x="400.0" y="373.0" class="box-text">3. Логика (skills.py)</text>
    <text x="400.0" y="393.0" class="sub-text">master_viral_hunter()</text>
    <line x1="300" y1="375" x2="250" y2="375" class="arrow" marker-end="url(#arrowhead)"/>
    <line x1="500" y1="375" x2="550" y2="375" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="50" y="340" width="200" height="70" fill="url(#gRed)" class="rect-box" />
    <text x="150.0" y="373.0" class="box-text">Браузер</text>
    <text x="150.0" y="393.0" class="sub-text">browser_core.py (Stealth)</text>
    <rect x="550" y="340" width="200" height="70" fill="url(#gRed)" class="rect-box" />
    <text x="650.0" y="373.0" class="box-text">Перехватчик</text>
    <text x="650.0" y="393.0" class="sub-text">interceptor.py (GraphQL)</text>
    <line x1="550" y1="410" x2="450" y2="470" class="arrow" marker-end="url(#arrowhead)"/>
    <rect x="300" y="470" width="200" height="70" fill="url(#gBlue)" class="rect-box" />
    <text x="400.0" y="503.0" class="box-text">4. Экспорт</text>
    <text x="400.0" y="523.0" class="sub-text">ui_generator.py (HTML/CSV)</text>
</svg>